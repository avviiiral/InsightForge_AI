name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate sample datasets
        run: python scripts/generate_sample_data.py

      - name: Run test suite
        run: pytest tests/ -v --cov=app --cov=backend --cov-report=term-missing

      - name: Verify backend imports cleanly
        run: python -c "from backend.main import app; print('Backend OK')"

      - name: Verify Streamlit app imports cleanly
        run: python -c "import ast; ast.parse(open('frontend/streamlit_app.py').read()); print('Frontend syntax OK')"

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t insightforge-backend:ci .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t insightforge-frontend:ci .
